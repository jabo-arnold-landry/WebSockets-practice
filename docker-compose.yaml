services:
  server:
    env_file:
      - ./server/.env
    build: ./server
    container_name: blog-container
    ports:
      - "3000:3000"
    volumes:
      - ./server:/app
      - /app/node_modules
  
  client:
   build: ./client
   container_name: client-blog-container
   ports:
    - '5000:5173'
   volumes:
    - ./server:/app
    - /app/node_modules  
